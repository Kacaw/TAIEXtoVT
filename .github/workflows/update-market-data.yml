name: Update Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1-5"
    - cron: "30 23 * * 1-5"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build latest market data
        run: python scripts/build_market_data.py

      - name: Commit refreshed CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --cached --quiet; then
            echo "No market data changes"
            exit 0
          fi
          git commit -m "chore: refresh market data"
          git push
